<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KFPC Spin Event</title>
  
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #09090b;
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center;
      color: white;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    .shield-panel {
      position: relative;
      width: 95vw;
      max-width: 1200px;
      height: 95vh;
      padding: 4vh 2vw;
      box-sizing: border-box;
      background: rgba(15, 15, 20, 0.45);
      backdrop-filter: blur(25px);
      border-radius: 36px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-evenly;
      z-index: 10;
      border: 1px solid rgba(100, 200, 255, 0.2);
    }

    .header img {
      width: clamp(100px, 15vmin, 180px);
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
    }

    .subtitle {
      font-size: clamp(11px, 1.5vmin, 16px);
      color: #c4c8d0;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: 500;
    }

    h1 {
      font-size: clamp(24px, 5vmin, 46px);
      font-weight: 800;
      margin: 0;
      text-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .wheel-container {
      position: relative;
      width: 75vmin;
      max-width: 580px;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: clamp(8px, 1.5vmin, 15px) solid #fff;
      box-sizing: border-box;
      transition: transform 0.1s linear; /* Faster transition response */
    }

    .idle-mode {
      animation: rgbBoundary 3s linear infinite, slowSpin 50s linear infinite;
    }

    @keyframes slowSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes rgbBoundary {
      0%, 100% { border-color: #FF2A2A; box-shadow: 0 0 60px #FF2A2A88; }
      33% { border-color: #00E676; box-shadow: 0 0 60px #00E67688; }
      66% { border-color: #2A84FF; box-shadow: 0 0 60px #2A84FF88; }
    }

    .pointer-wrapper {
      position: absolute;
      top: -5%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
    }

    .pointer {
      width: clamp(25px, 5vmin, 45px);
      height: clamp(35px, 7vmin, 60px);
      background: linear-gradient(180deg, #fff, #bbb);
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
    }

    .spin-button {
      width: 85%;
      max-width: 450px;
      padding: clamp(15px, 3vmin, 22px) 20px;
      font-size: clamp(18px, 4vmin, 28px);
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #ffe58f, #f59e0b);
      color: #111;
      cursor: pointer;
      font-weight: 800;
      text-transform: uppercase;
      box-shadow: 0 8px 25px rgba(245, 158, 11, 0.5);
      transition: 0.2s;
    }

    .spin-button:disabled {
      background: rgba(255, 255, 255, 0.1);
      color: #555;
      cursor: not-allowed;
      box-shadow: none;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(25px);
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background: #0a0a0c;
      padding: 50px;
      border-radius: 40px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .redirect-line {
      margin-top: 20px;
      font-size: 16px;
      color: #00E676;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="shield-panel">
  <div class="header">
    <img src="logo.png" alt="LOGO" onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';">
    <div id="logoFallback" style="display:none; font-weight:800; font-size:28px;">KFPC</div>
    <div class="subtitle">Presents</div>
  </div>

  <h1>🌈 Spin Your Color</h1>

  <div class="wheel-container">
    <div class="pointer-wrapper"><div class="pointer"></div></div>
    <canvas id="wheel" class="idle-mode"></canvas>
  </div>

  <div id="buttonArea" style="width:100%; display:flex; flex-direction:column; align-items:center;">
    <button id="spinBtn" class="spin-button" onclick="startSpin()">SPIN TO WIN</button>
  </div>
</div>

<div id="winnerModal" class="modal-overlay">
  <div class="modal-content">
    <div style="color:#aaa; text-transform:uppercase; letter-spacing:4px; font-size:14px;">Boom! You got</div>
    <h2 id="modalWinnerColor" style="font-size:80px; margin:10px 0; font-weight:800;">COLOR</h2>
    <div id="redirectText" class="redirect-line">Redirecting in 2s...</div>
  </div>
</div>

<audio id="tickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
<audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>

<script>
const colors = ["Red","Blue","Green","Yellow","Pink","Orange"];
const colorValues = ["#FF2A2A", "#2A84FF", "#00E676", "#FFEA00", "#FF69B4", "#FF6600"];
const formBaseUrl = "https://docs.google.com/forms/d/e/1FAIpQLSfw66vDJKTwGG3rxuQhHX0vyB2I5wVvqtgkYGx6on8PWfa0Kw/viewform?usp=pp_url&entry.2109138769=";

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const spinBtn = document.getElementById('spinBtn');
const buttonArea = document.getElementById('buttonArea');
const tickSound = document.getElementById('tickSound');
const winSound = document.getElementById('winSound');

let currentRotation = 0;
let isSpinning = false;

canvas.width = 1200; canvas.height = 1200;
ctx.scale(4, 4); 

function drawWheel() {
  const cx = 150, cy = 150, r = 142;
  const arc = (Math.PI * 2) / colors.length;
  colors.forEach((color, i) => {
    ctx.beginPath();
    ctx.fillStyle = colorValues[i];
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, i * arc, (i + 1) * arc);
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.1)";
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(i * arc + arc / 2);
    ctx.fillStyle = color === "Yellow" ? "#111" : "#fff";
    ctx.font = "bold 16px Poppins";
    ctx.textAlign = "right";
    ctx.fillText(color, r - 25, 6);
    ctx.restore();
  });
}

function checkPersistence() {
  const hasSpun = localStorage.getItem("kfpc_has_spun") === "true";
  const savedColor = localStorage.getItem("kfpc_result");
  const savedHex = localStorage.getItem("kfpc_result_hex");

  if (hasSpun && savedColor) {
    spinBtn.innerText = "ALREADY SPUN";
    spinBtn.disabled = true;
    canvas.classList.remove("idle-mode");
    canvas.style.opacity = "0.2";
    
    buttonArea.innerHTML += `
      <div style="margin-top:20px; width:85%; max-width:450px; text-align:center;">
        <button onclick="window.location.href='${formBaseUrl + encodeURIComponent(savedColor)}'" 
                class="spin-button" 
                style="background:${savedHex}; color:${savedColor==='Yellow'?'#111':'#fff'}; box-shadow: 0 15px 35px ${savedHex}77; width:100%;">
          VIEW YOUR ${savedColor.toUpperCase()} FORM
        </button>
      </div>`;
  }
}

function startSpin() {
  if (isSpinning || localStorage.getItem("kfpc_has_spun")) return;
  isSpinning = true;
  canvas.classList.remove("idle-mode");
  spinBtn.disabled = true;
  spinBtn.innerText = "FAST SPINNING...";
  
  tickSound.play().then(() => tickSound.pause());

  // SPEED INCREASE: 3 seconds instead of 5
  const duration = 3000; 
  const start = performance.now();
  const rotationTotal = 2800 + (Math.random() * 360); 
  let lastTickPos = 0;

  function animate(time) {
    const elapsed = time - start;
    const progress = Math.min(elapsed / duration, 1);
    
    // FAST CURVE: Cubic ease out
    const ease = 1 - Math.pow(1 - progress, 3);
    
    currentRotation = rotationTotal * ease;
    canvas.style.transform = `rotate(${currentRotation}deg)`;
    
    let currentTickPos = Math.floor(currentRotation / (360 / colors.length));
    if (currentTickPos !== lastTickPos) {
      tickSound.currentTime = 0;
      tickSound.play().catch(()=>{});
      lastTickPos = currentTickPos;
    }

    if (progress < 1) requestAnimationFrame(animate);
    else finalize();
  }
  requestAnimationFrame(animate);
}

function finalize() {
  const finalAngle = (360 - (currentRotation % 360) + 270) % 360;
  const index = Math.floor(finalAngle / (360 / colors.length)) % colors.length;
  const winColor = colors[index], winHex = colorValues[index];

  localStorage.setItem("kfpc_has_spun", "true");
  localStorage.setItem("kfpc_result", winColor);
  localStorage.setItem("kfpc_result_hex", winHex);

  document.getElementById("modalWinnerColor").innerText = winColor.toUpperCase();
  document.getElementById("modalWinnerColor").style.color = winHex;
  document.getElementById("winnerModal").classList.add("active");

  // Immediate confetti
  confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: [winHex, '#fff'] });
  winSound.play().catch(() => {});

  // REDIRECT INCREASE: 2 seconds instead of 5
  let timeLeft = 2; 
  const timer = setInterval(() => {
    timeLeft--;
    document.getElementById("redirectText").innerText = `Redirecting in ${timeLeft}s...`;
    if(timeLeft <= 0) {
      clearInterval(timer);
      window.location.href = formBaseUrl + encodeURIComponent(winColor);
    }
  }, 1000);
}

drawWheel();
checkPersistence();
</script>
</body>
</html>
